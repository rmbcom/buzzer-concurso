<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pulsador</title>
    <style>
      :root {
        --bg: #020604;
        --panel: rgba(3, 18, 12, 0.9);
        --green: #39ff88;
        --cyan: #20e3ff;
        --amber: #ffd166;
        --red: #ff3864;
        --ink: #d9ffe7;
        --muted: #82b69a;
        --line: rgba(57, 255, 136, 0.32);
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        font-family: "Courier New", Consolas, monospace;
        background: var(--bg);
        overflow-x: hidden;
      }

      #matrix {
        position: fixed;
        inset: 0;
        z-index: 0;
        opacity: 0.24;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        background: repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.04) 0,
          rgba(255, 255, 255, 0.04) 1px,
          transparent 1px,
          transparent 5px
        );
        mix-blend-mode: screen;
      }

      main {
        position: relative;
        z-index: 2;
        width: min(720px, 100%);
        min-height: 100vh;
        margin: 0 auto;
        padding: 20px;
        display: grid;
        place-items: center;
      }

      .panel {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: clamp(20px, 4vw, 36px);
        background: var(--panel);
        box-shadow: 0 0 36px rgba(57, 255, 136, 0.16), inset 0 0 28px rgba(57, 255, 136, 0.08);
      }

      .hidden { display: none !important; }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--green);
        font-size: 0.82rem;
        font-weight: 900;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 22px;
        color: var(--green);
        font-size: clamp(2.5rem, 10vw, 5.4rem);
        line-height: 0.9;
        letter-spacing: 0;
        text-transform: uppercase;
        text-shadow: 0 0 26px rgba(57, 255, 136, 0.34);
      }

      label {
        display: grid;
        gap: 9px;
        color: var(--muted);
        font-size: 0.92rem;
        font-weight: 900;
        text-transform: uppercase;
      }

      input,
      button {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px 16px;
        color: var(--ink);
        background: rgba(0, 0, 0, 0.44);
        font: inherit;
        font-weight: 900;
      }

      input:focus {
        outline: 3px solid rgba(32, 227, 255, 0.2);
        border-color: var(--cyan);
      }

      button {
        cursor: pointer;
        transition: transform 140ms ease, opacity 140ms ease, box-shadow 140ms ease;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 18px rgba(57, 255, 136, 0.24);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
        transform: none;
      }

      .primary {
        margin-top: 18px;
        color: #001b0b;
        background: var(--green);
      }

      .buzzer-screen {
        width: 100%;
        text-align: center;
      }

      .hello {
        margin: 0 0 24px;
        color: var(--cyan);
        font-size: clamp(1.1rem, 4vw, 1.6rem);
        font-weight: 900;
        text-transform: uppercase;
      }

      .buzz {
        width: min(310px, 78vw);
        height: min(310px, 78vw);
        border-radius: 999px;
        border: 6px solid rgba(255, 255, 255, 0.16);
        color: white;
        background:
          radial-gradient(circle at 38% 28%, rgba(255, 255, 255, 0.26), transparent 24%),
          radial-gradient(circle at center, #ff3864, #b31335 62%, #570817 100%);
        box-shadow: 0 22px 0 #4c0512, 0 0 56px rgba(255, 56, 100, 0.46);
        font-size: clamp(2.4rem, 10vw, 4.8rem);
        line-height: 0.95;
        text-transform: uppercase;
      }

      .buzz:active {
        transform: translateY(14px);
        box-shadow: 0 8px 0 #4c0512, 0 0 48px rgba(255, 56, 100, 0.42);
      }

      .secondary {
        width: auto;
        margin-top: 34px;
        color: var(--green);
        background: rgba(57, 255, 136, 0.1);
      }

      .status {
        min-height: 1.6em;
        margin: 20px 0 0;
        color: var(--muted);
        font-weight: 900;
      }

      .error {
        min-height: 1.5em;
        margin: 14px 0 0;
        color: var(--red);
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <canvas id="matrix"></canvas>

    <main>
      <section id="loginView" class="panel">
        <p class="eyebrow">Concurso en directo</p>
        <h1>Acceso</h1>
        <label>
          Nombre de usuario
          <input id="usernameInput" maxlength="40" placeholder="Tu nombre">
        </label>
        <button id="enterButton" class="primary">
          Entrar
        </button>
        <p id="loginError" class="error"></p>
      </section>

      <section id="buzzerView" class="buzzer-screen hidden">
        <p id="helloText" class="hello"></p>
        <button id="buzzButton" class="buzz">
          Pulsador
        </button>
        <br>
        <button id="leaveButton" class="secondary">
          Salir y cambiar nombre
        </button>
        <p id="statusText" class="status"></p>
      </section>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
      import {
        getDatabase,
        ref,
        set,
        update,
        push,
        serverTimestamp,
        onDisconnect,
        onValue,
        runTransaction,
        get
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

      // Pega aqui la configuracion de Firebase de tu proyecto.
      const firebaseConfig = {
        apiKey: "AIzaSyDWvS8aYd7tx3pc2kxZewJVlXH5xIPAgHM",
        authDomain: "pulsadorconcurso.firebaseapp.com",
        databaseURL: "https://pulsadorconcurso-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "pulsadorconcurso",
        storageBucket: "pulsadorconcurso.firebasestorage.app",
        messagingSenderId: "124348060991",
        appId: "1:124348060991:web:6dd54bbe290b1bfa61ef8a"
      };

      const ROOM_ID = "principal";
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      const loginView = document.querySelector("#loginView");
      const buzzerView = document.querySelector("#buzzerView");
      const usernameInput = document.querySelector("#usernameInput");
      const enterButton = document.querySelector("#enterButton");
      const buzzButton = document.querySelector("#buzzButton");
      const leaveButton = document.querySelector("#leaveButton");
      const helloText = document.querySelector("#helloText");
      const statusText = document.querySelector("#statusText");
      const loginError = document.querySelector("#loginError");

      let username = localStorage.getItem("buzzerUsername") || "";
      let playerId = localStorage.getItem("buzzerPlayerId") || crypto.randomUUID();
      let turnLocked = false;
      let latestCurrentBuzz = null;
      let ownParticipantUnsubscribe = null;
      localStorage.setItem("buzzerPlayerId", playerId);

      function playerRef() {
        return ref(db, `rooms/${ROOM_ID}/participants/${playerId}`);
      }

      function showBuzzer() {
        loginView.classList.add("hidden");
        buzzerView.classList.remove("hidden");
        helloText.textContent = `Jugador: ${username}`;
        applyCurrentBuzzState();
      }

      function showLogin() {
        buzzerView.classList.add("hidden");
        loginView.classList.remove("hidden");
        usernameInput.value = "";
        usernameInput.focus();
      }

      async function join() {
        username = usernameInput.value.trim();
        if (!username) {
          loginError.textContent = "Escribe un nombre.";
          return;
        }

        loginError.textContent = "";
        localStorage.setItem("buzzerUsername", username);
        if (ownParticipantUnsubscribe) {
          ownParticipantUnsubscribe();
          ownParticipantUnsubscribe = null;
        }

        const previousPlayer = (await get(playerRef())).val();
        await set(playerRef(), {
          id: playerId,
          name: username,
          active: true,
          score: Number(previousPlayer?.score) || 0,
          joinedAt: serverTimestamp(),
          lastSeenAt: serverTimestamp()
        });

        onDisconnect(playerRef()).update({
          active: false,
          leftAt: serverTimestamp()
        });

        ownParticipantUnsubscribe = onValue(playerRef(), (snapshot) => {
          const player = snapshot.val();
          if (!username || !player || player.active !== false || !player.removedAt) return;

          username = "";
          localStorage.removeItem("buzzerUsername");
          statusText.textContent = "";
          loginError.textContent = "El moderador te ha eliminado. Puedes entrar de nuevo con otro nombre.";
          showLogin();
        });

        showBuzzer();
      }

      function applyCurrentBuzzState() {
        if (!username) return;

        if (!latestCurrentBuzz) {
          turnLocked = false;
          buzzButton.disabled = false;
          statusText.textContent = "Turno abierto. Listo para pulsar.";
          return;
        }

        turnLocked = true;
        buzzButton.disabled = true;

        if (latestCurrentBuzz.playerId === playerId) {
          statusText.textContent = "¡Has pulsado primero! Espera al moderador.";
        } else {
          statusText.textContent = `Turno bloqueado por ${latestCurrentBuzz.name}.`;
        }
      }

      async function buzz() {
        if (turnLocked) {
          statusText.textContent = "Turno bloqueado. Espera a que el moderador pulse continuar.";
          return;
        }

        buzzButton.disabled = true;
        statusText.textContent = "Comprobando turno...";

        const currentBuzzRef = ref(db, `rooms/${ROOM_ID}/currentBuzz`);
        const result = await runTransaction(currentBuzzRef, (currentValue) => {
          if (currentValue !== null) {
            return;
          }

          return {
            playerId,
            name: username,
            createdAt: Date.now()
          };
        });

        if (!result.committed) {
          turnLocked = true;
          buzzButton.disabled = true;
          statusText.textContent = "Ya ha pulsado otra persona. Espera al siguiente turno.";
          return;
        }

        turnLocked = true;
        statusText.textContent = "¡Has pulsado primero!";

        const buzzRef = push(ref(db, `rooms/${ROOM_ID}/buzzes`));
        await set(buzzRef, {
          id: buzzRef.key,
          playerId,
          name: username,
          createdAt: serverTimestamp()
        });

        await update(playerRef(), {
          active: true,
          lastBuzzAt: serverTimestamp(),
          lastSeenAt: serverTimestamp()
        });
      }

      async function leave() {
        const oldName = username;
        username = "";
        localStorage.removeItem("buzzerUsername");

        if (oldName) {
          await update(playerRef(), {
            active: false,
            leftAt: serverTimestamp()
          });
        }

        showLogin();
      }

      enterButton.addEventListener("click", join);
      usernameInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") join();
      });
      buzzButton.addEventListener("click", buzz);
      leaveButton.addEventListener("click", leave);

      onValue(ref(db, `rooms/${ROOM_ID}/currentBuzz`), (snapshot) => {
        latestCurrentBuzz = snapshot.val();
        applyCurrentBuzzState();
      });

      if (username) {
        usernameInput.value = username;
        join();
      }

      const canvas = document.querySelector("#matrix");
      const ctx = canvas.getContext("2d");
      const glyphs = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&/<>[]{}";
      let drops = [];

      function resizeMatrix() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        drops = Array(Math.ceil(canvas.width / 18)).fill(0).map(() => Math.random() * -80);
      }

      function drawMatrix() {
        ctx.fillStyle = "rgba(2, 6, 4, 0.14)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#39ff88";
        ctx.font = "18px Courier New";
        drops.forEach((drop, index) => {
          const char = glyphs[Math.floor(Math.random() * glyphs.length)];
          ctx.fillText(char, index * 18, drop * 18);
          drops[index] = drop * 18 > canvas.height && Math.random() > 0.975 ? 0 : drop + 1;
        });
        requestAnimationFrame(drawMatrix);
      }

      window.addEventListener("resize", resizeMatrix);
      resizeMatrix();
      drawMatrix();
    </script>
  </body>
</html>
